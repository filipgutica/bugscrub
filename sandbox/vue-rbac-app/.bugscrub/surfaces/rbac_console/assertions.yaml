- name: page_not_blank
  kind: dom_presence
  description: The RBAC page title remains visible.
  match:
    test_id: rbac-page-title
- name: actions_panel_visible
  kind: dom_presence
  description: The role-aware actions panel remains visible.
  match:
    test_id: rbac-actions-panel
- name: export_hidden_for_viewer
  kind: dom_absence
  description: Viewer sessions should not see the export audit button.
  match:
    test_id: export-audit-button
