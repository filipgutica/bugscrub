name: rbac-visibility-check
target:
  surface: rbac_console
  env: local
setup:
  - capability: login
    as: admin
exploration:
  tasks:
    - capability: inspect_role_actions
      as: admin
      min: 1
      max: 2
    - capability: switch_identity
      as: viewer
      min: 1
      max: 1
    - capability: inspect_role_actions
      as: viewer
      min: 1
      max: 2
hard_assertions:
  - page_not_blank
  - actions_panel_visible
  - export_hidden_for_viewer
evidence:
  screenshots: true
  network_logs: false
