version: "0"
project: bugscrub-vue-rbac-sandbox
defaultEnv: local
envs:
  local:
    baseUrl: http://localhost:5173
    defaultIdentity: local_user
    identities:
      local_user:
        auth:
          type: env
          usernameEnvVar: BUGSCRUB_LOCAL_USER
          passwordEnvVar: BUGSCRUB_LOCAL_PASS
agent:
  preferred: auto
  timeout: 300
  maxBudgetUsd: 5
  maxSteps: 20
