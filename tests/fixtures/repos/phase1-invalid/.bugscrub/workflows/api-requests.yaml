name: api-requests-exploration
target:
  surface: api_requests
  env: staging
setup:
  - capability: login
exploration:
  tasks:
    - capability: inspect_requests_list
      as: missing_user
      min: 1
      max: 2
hard_assertions:
  - page_not_blank
  - missing_assertion
evidence:
  screenshots: true
  network_logs: true
